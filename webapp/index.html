<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vendor Portal</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background:
        linear-gradient(rgba(21, 34, 63, 0.25) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21, 34, 63, 0.25) 1px, transparent 1px),
        linear-gradient(180deg, #050b1a 0%, #08152d 100%);
      background-size: 40px 40px, 40px 40px, cover;
      overflow: hidden;
    }

    .sapUiBody {
      background: transparent !important;
    }

    .heroWrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .brandText {
      color: #2da8ff !important;
      font-size: 22px !important;
      font-weight: 700 !important;
      text-align: center;
      margin-bottom: 18px !important;
    }

    .topBadge {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid rgba(45,168,255,0.35);
      border-radius: 999px;
      color: #2da8ff !important;
      font-size: 13px !important;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(20, 38, 73, 0.45);
      margin-bottom: 22px !important;
    }

    .heroTitle {
      text-align: center;
      font-size: 76px !important;
      line-height: 1.02 !important;
      font-weight: 900 !important;
      color: #eef3ff !important;
      margin: 0 !important;
    }

    .heroBlue {
      color: #2da8ff !important;
    }

    .heroSub {
      text-align: center;
      color: #8da2c9 !important;
      font-size: 18px !important;
      line-height: 1.6 !important;
      max-width: 760px;
      margin: 22px auto 40px auto !important;
    }

    .cardRow {
      gap: 22px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .featureCard {
      width: 280px;
      min-height: 220px;
      padding: 26px;
      border-radius: 22px;
      background: rgba(24, 35, 63, 0.92);
      border: 1px solid rgba(84, 116, 176, 0.28);
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }

    .cardIcon {
      font-size: 32px;
      margin-bottom: 18px;
    }

    .cardTitle {
      color: #f3f7ff !important;
      font-size: 20px !important;
      font-weight: 700 !important;
      margin-bottom: 10px !important;
    }

    .cardDesc {
      color: #8ea0c4 !important;
      font-size: 15px !important;
      line-height: 1.5 !important;
      margin-bottom: 20px !important;
    }

    .cardBtn {
      width: 100%;
    }

    .formWrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .formInput {
      margin-bottom: 12px;
    }

    .innerPage {
      background: linear-gradient(180deg, #08101f 0%, #0d1830 100%) !important;
    }
  </style>

  <script
    id="sap-ui-bootstrap"
    src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon_dark"
    data-sap-ui-libs="sap.m"
    data-sap-ui-resourceroots='{
      "vendorportal": "./"
    }'
    data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">
  </script>
</head>

<body class="sapUiBody">
  <div data-sap-ui-component data-name="vendorportal"></div>
</body>
</html>
